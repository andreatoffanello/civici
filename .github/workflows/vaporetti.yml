name: Aggiorna orari vaporetti

on:
  schedule:
    # Ogni lunedì alle 05:00 UTC (07:00 ora italiana)
    - cron: '0 5 * * 1'
  workflow_dispatch: # Permette esecuzione manuale

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Genera JSON vaporetti da GTFS
        run: python .github/scripts/build_vaporetti.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/vaporetti.json ios/DoVe/Resources/Data/vaporetti.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai dati"
          else
            git commit -m "chore: aggiorna orari vaporetti $(date +%Y-%m-%d)"
            git push
          fi
